version: "2"
type: frontend
tech_stack:
  - next.js
  - react
  - tailwindcss
  - supabase
  - lucide-react
  - motion/react
routes:
  - path: /login
    file: app/login/page.tsx
    auth_required: false
    description: User login and registration
  - path: /client-home
    file: app/client-home/page.tsx
    auth_required: true
    description: Client home page showing barbers and services
  - path: /client-home/agendar
    file: app/client-home/agendar/page.tsx
    auth_required: true
    description: Appointment booking flow for clients
  - path: /professional-dashboard
    file: app/professional-dashboard/page.tsx
    auth_required: true
    description: Dashboard for professionals showing schedule and earnings
  - path: /professional-dashboard/perfil
    file: app/professional-dashboard/perfil/page.tsx
    auth_required: true
    description: Professional profile settings including dynamic work schedule
features:
  - name: User Login and Registration
    description: Login with email/password or create new account
    files:
      - app/login/page.tsx
    entry_route: /login
    user_interactions:
      - Fill email and password
      - Toggle login/signup
      - Submit form
    api_calls:
      - method: POST
        endpoint: Supabase Auth
    auth_required: false
  - name: Appointment Booking
    description: Client selects barber, service, date, and time
    files:
      - app/client-home/agendar/page.tsx
    entry_route: /client-home/agendar
    user_interactions:
      - Select Barber
      - Select Service
      - Select Date and Time from dynamic generated slots
      - Confirm Appointment
    api_calls:
      - method: POST
        endpoint: Supabase appointments
    auth_required: true
  - name: Professional Work Schedule Configuration
    description: Professional configures start/end time, lunch break, and work days
    files:
      - app/professional-dashboard/perfil/page.tsx
    entry_route: /professional-dashboard/perfil
    user_interactions:
      - Update work_start_time
      - Update work_end_time
      - Select work_days array
    api_calls:
      - method: UPDATE
        endpoint: Supabase profiles
    auth_required: true
known_limitations: []
